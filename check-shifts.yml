name: Check smeny.cz shifts

on:
  schedule:
    # Every 10 minutes. GitHub may delay this slightly under load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write # needed so the job can commit the updated state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shift check
        env:
          SMENY_EMAIL: ${{ secrets.SMENY_EMAIL }}
          SMENY_PASSWORD: ${{ secrets.SMENY_PASSWORD }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python watch_shifts.py

      - name: Commit updated state
        run: |
          git config user.name "shift-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update shift state [skip ci]"
          git push
