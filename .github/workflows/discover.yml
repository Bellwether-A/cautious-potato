name: Discover shift page (test run, no WhatsApp sent)

on:
  workflow_dispatch: {} # only runs when you click "Run workflow" manually

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery (dry run -- no WhatsApp, no state saved)
        env:
          SMENY_EMAIL: ${{ secrets.SMENY_EMAIL }}
          SMENY_PASSWORD: ${{ secrets.SMENY_PASSWORD }}
          SHOW_DETAILS_IN_LOGS: "false"
        run: python watch_shifts.py --discover
