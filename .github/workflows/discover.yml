name: Discover shift page (run once for setup)

on:
  workflow_dispatch: {} # only runs when you click "Run workflow" manually

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run discovery
        env:
          SMENY_EMAIL: ${{ secrets.SMENY_EMAIL }}
          SMENY_PASSWORD: ${{ secrets.SMENY_PASSWORD }}
          SHIFTS_URL: ${{ secrets.SHIFTS_URL }}
        run: python watch_shifts.py --discover

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: discover_*
          if-no-files-found: warn
          retention-days: 3
