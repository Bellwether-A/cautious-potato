name: Test WhatsApp (CallMeBot only, no smeny.cz login)

on:
  workflow_dispatch: {} # only runs when you click "Run workflow" manually

jobs:
  test-whatsapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test WhatsApp message
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python watch_shifts.py --test-whatsapp
